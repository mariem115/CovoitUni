security:
    password_hashers:
        App\Entity\User:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                default_target_path: app_home
            logout:
                path: app_logout
                target: app_home
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800

    access_control:
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/trajets/nouveau, roles: ROLE_USER }
        - { path: ^/mes-trajets, roles: ROLE_USER }
        - { path: ^/mes-reservations, roles: ROLE_USER }
        - { path: ^/reserver, roles: ROLE_USER }
        - { path: ^/reservation/, roles: ROLE_USER }
        - { path: ^/profil/modifier, roles: ROLE_USER }
        - { path: ^/mon-profil, roles: ROLE_USER }
        - { path: ^/noter, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
